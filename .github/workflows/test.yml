name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: qms
          POSTGRES_PASSWORD: qms_secret
          POSTGRES_DB: qms_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qms -d qms_platform_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://qms:qms_secret@localhost:5432/qms_platform_test

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://qms:qms_secret@localhost:5432/qms_platform_test
          JWT_SECRET: test-jwt-secret

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: TypeScript check
        run: npx tsc -b

      - name: Run tests
        run: npm test
