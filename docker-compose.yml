services:
  postgres:
    image: postgres:17-alpine
    container_name: qms-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: qms
      POSTGRES_PASSWORD: qms_secret
      POSTGRES_DB: qms_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - qms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qms -d qms_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: qms-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@qms.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - qms-network
    depends_on:
      - postgres

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qms-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      DATABASE_URL: postgresql://qms:qms_secret@postgres:5432/qms_platform
      JWT_SECRET: change_me_in_production
    networks:
      - qms-network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qms-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - qms-network
    depends_on:
      - backend

networks:
  qms-network:
    driver: bridge

volumes:
  pgdata:
  pgadmin-data:
