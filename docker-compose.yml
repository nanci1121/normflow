services:
  postgres:
    image: postgres:17-alpine
    container_name: qms-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: qms
      POSTGRES_PASSWORD: qms_secret
      POSTGRES_DB: qms_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - qms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qms -d qms_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:${PGADMIN_IMAGE_TAG:-latest}
    container_name: qms-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@qms.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - qms-network
    depends_on:
      - postgres

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY:-qms-platform}/backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: qms-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      DATABASE_URL: postgresql://qms:${POSTGRES_PASSWORD:-qms_secret}@postgres:5432/qms_platform
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - qms-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY:-qms-platform}/frontend:${FRONTEND_IMAGE_TAG:-latest}
    container_name: qms-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - qms-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  qms-network:
    driver: bridge

volumes:
  pgdata:
  pgadmin-data:
